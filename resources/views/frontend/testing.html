<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quotation Modal</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Button to Open Modal -->
<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#quoteModal">
  Open Quotation Form
</button>

<!-- Modal -->
<div class="modal fade" id="quoteModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Quotation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="row">
          <!-- Left: Product Image -->
          <div class="col-md-4 text-center">
            <img src="your-image.jpg" class="img-fluid mb-3" alt="Product">
          </div>

          <!-- Right: Form Section -->
          <div class="col-md-8">
            <h5>Canvas Jumbo Tote w/ Bottom Gusset</h5>
            <p class="mb-1">20"W x 15"H x 5"D</p>
            <p class="text-muted">TB600</p>

            <!-- Select Color -->
            <h6>Select Color:</h6>
            <div class="row g-1">
              <div class="col-4"><input type="checkbox"> Black</div>
              <div class="col-4"><input type="checkbox"> Chocolate</div>
              <div class="col-4"><input type="checkbox"> Dark Grey</div>
              <div class="col-4"><input type="checkbox"> Light Pink</div>
              <div class="col-4"><input type="checkbox"> Lime</div>
              <div class="col-4"><input type="checkbox"> Natural</div>
              <div class="col-4"><input type="checkbox"> Navy</div>
              <div class="col-4"><input type="checkbox"> Red</div>
              <div class="col-4"><input type="checkbox"> Royal</div>
              <div class="col-4"><input type="checkbox"> White</div>
              <div class="col-4"><input type="checkbox"> Yellow</div>
            </div>

            <hr>

            <!-- Blank or Decorated -->
            <div class="mb-3">
              <label class="form-label d-block">Decoration:</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="decor" checked>
                <label class="form-check-label">Blank</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="decor">
                <label class="form-check-label">Decorated/Embellished</label>
              </div>
            </div>

            <!-- Form Fields -->
            <div class="mb-3">
              <label class="form-label">Quantity</label>
              <input type="number" class="form-control" placeholder="Enter quantity">
            </div>

            <div class="mb-3">
              <label class="form-label">Ship To Zip Code</label>
              <input type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Company Name</label>
              <input type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">ASI / PPAI / SAGE #</label>
              <input type="text" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">In Hand Date</label>
              <input type="date" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Need Freight Estimate?</label><br>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="freight" checked>
                <label class="form-check-label">Yes</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="freight">
                <label class="form-check-label">No</label>
              </div>
            </div>

          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary">Submit Quote</button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
